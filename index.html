<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | HD & Premium</title>
    
    <script type='text/javascript' src='https://pubnotepad.com/7ZrVHM'></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 20px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 30px; }
        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background-color: rgba(255, 255, 255, 0.05); color: #fff; font-size: 16px; outline: none; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-normal { background-color: transparent; color: #64748b; border: 2px solid rgba(100, 116, 139, 0.4); }
        .btn-premium { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #1e293b; position: relative; }
        .premium-tag { background-color: #ef4444; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 20px; position: absolute; top: -10px; right: -10px; }
        footer { margin-top: 40px; color: #4b5563; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Downloader</h1>
        <input type="text" id="url" placeholder="Paste link here...">
        
        <div class="btn-group">
            <button class="btn-normal" onclick="downloadNormal()">Normal (Max 720p)</button>
            <button class="btn-premium" onclick="downloadPremium()">
                Premium (1K+ HD)
                <span class="premium-tag">POPULAR</span>
            </button>
        </div>
    </div>

    <    <footer style="margin-top: 50px; text-align: center; padding: 20px;">
        <p style="color: #64748b; font-size: 14px;">
            Powered by 
            <span style="
                color: #38bdf8; 
                font-weight: 700; 
                text-transform: uppercase; 
                letter-spacing: 2px;
                text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
                padding: 5px 15px;
                border: 1px solid #38bdf8;
                border-radius: 5px;
                background: rgba(56, 189, 248, 0.1);
            ">
                Sheikh Lam
            </span>
        </p>
    </footer>
        
        <p>Created with 👑 by <strong>Sheikh Lam</strong></p>
    </footer>

    <script>
        function downloadNormal() {
            var url = document.getElementById('url').value;
            if(url) {
                // নরমাল ডাউনলোডের লিংক এখানে দাও
                window.location.href = "https://your-free-server.com/download?url=" + encodeURIComponent(url);
            } else { alert("Link den boss!"); }
        }

        function downloadPremium() {
            var url = document.getElementById('url').value;
            if(url) {
                // প্রিমিয়াম Gplinks লিংক
                window.location.href = "https://gplinks.co/bDpYz?url=" + encodeURIComponent(url);
            } else { alert("Link den boss!"); }
        }
    </script>
</body>
</html>
