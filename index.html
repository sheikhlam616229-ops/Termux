<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Downloader | Sheikh Lam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --neon: #00ff41; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: var(--glass); border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .footer-links { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Premium Downloader</h1>
    <input type="text" id="url" placeholder="Paste video link here...">
    
    <select id="quality">
        <option value="720">720p HD</option>
        <option value="1080">1080p Full HD</option>
        <option value="mp3">MP3 Audio</option>
    </select>

    <button class="btn" onclick="startDownload()">🚀 DOWNLOAD NOW</button>

    <div class="footer-links">
        <a href="https://www.facebook.com/lam.sheikh.773981">Facebook</a>
        <a href="https://www.youtube.com/@SheikhLam">YouTube</a>
    </div>
    <p style="font-size: 10px; color: #444; margin-top: 20px;">Created by Sheikh Lam</p>
</div>

<script>
    function startDownload() {
        var url = document.getElementById("url").value;
        var qual = document.getElementById("quality").value;
        if(url.length < 5) { alert("Please paste a valid link"); return; }
        
        // এটি ইউজারকে সিলেক্ট করা কোয়ালিটি অনুযায়ী ডাউনলোডের জন্য প্রস্তুত করবে
        window.open("https://loader.to/api/button/?url=" + encodeURIComponent(url) + "&f=" + qual, "_blank");
    }
</script>
</body>
</html>
