<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All in One Downloader</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        h1 { color: #00ff00; margin-bottom: 5px; }
        .sub-title { color: #888; margin-bottom: 20px; }
        .input-box { width: 90%; max-width: 400px; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 15px; }
        .btn { padding: 15px 30px; background: #00ff00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; width: 90%; max-width: 430px; }
        .social-links { margin-top: 40px; }
        .social-links a { color: #00ff00; text-decoration: none; margin: 0 10px; font-weight: bold; }
        .footer { margin-top: 30px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <h1>🚀 All in One Downloader</h1>
    <p class="sub-title">Download videos from any platform instantly!</p>

    <input type="text" class="input-box" placeholder="Paste your video link here...">
    <br>
    <button class="btn">DOWNLOAD NOW</button>

    <div class="social-links">
        <p>Follow me on:</p>
        <a href="https://facebook.com/your-profile" target="_blank">Facebook</a> | 
        <a href="https://youtube.com/your-channel" target="_blank">YouTube</a>
    </div>

    <div class="footer">
        <p>Developed by <b>Sheikh Lam</b></p>
    </div>

</body>
</html>
