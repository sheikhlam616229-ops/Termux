<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Downloader Zone</title>
    <style>
        body {
            background-color: #0d0d13;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 40px auto;
            background: #161623;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 1px solid #2f2f44;
        }
        h1 {
            color: #00ff66;
            font-size: 26px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .input-box {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1f1f33;
            color: #fff;
            font-size: 14px;
            outline: none;
            text-align: center;
        }
        .input-box:focus {
            border-color: #00ff66;
        }
        .download-btn {
            width: 95%;
            background: #00ff66;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .download-btn:hover {
            background: #00cc52;
            box-shadow: 0 0 15px rgba(0,255,102,0.6);
        }
    </style>
</head>
<body>

    <div class="container">

        <input type="text" class="input-box" placeholder="Paste Video URL Here...">

        <button class="download-btn" onclick="handleDownload()">🚀 DOWNLOAD NOW</button>
    </div>

    <script>
        function handleDownload() {

            // তোমার আসল Adsterra ইনকাম লিংক

            const gplinkPrimary = 'https://gplinks.co/bDpYz';

            if (!inputLink) {

                return;
            }

            // ১. প্রথমে নতুন ট্যাবে ব্যাকগ্রাউন্ডে তোমার Adsterra ইনকাম লিংক ওপেন হবে (১ম ইনকাম)
            window.open(adsterraSmartLink, '_blank');
            
            // ২. ঠিক সাথে সাথে মেইন ট্যাবে GPLinks ওপেন হবে যা শর্টনারের অ্যাড দেখাবে (২য় ইনকাম)
            // অ্যাড পার হওয়ার পর ইউজার সরাসরি MrBeast-এর সাবমেরিন ভিডিওতে চলে যাবে
            setTimeout(function() {
                window.location.href = gplinkPrimary;
            }, 300); 
        }
    </script>

</body>
</html>
