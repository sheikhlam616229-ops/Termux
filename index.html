<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #00ff00; margin-bottom: 20px; }
        .input-box { width: 90%; max-width: 400px; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; }
        .btn { padding: 15px 30px; background: #00ff00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; width: 90%; max-width: 430px; margin-bottom: 20px; }
        
        /* আইকন গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; text-decoration: none; color: #fff; font-weight: bold; }
        
        /* অরিজিনাল কালার */
        .fa-facebook { color: #1877f2; margin-right: 8px; }
        .fa-youtube { color: #ff0000; margin-right: 8px; }
        .fa-tiktok { color: #fff; margin-right: 8px; }
        .fa-twitter { color: #1da1f2; margin-right: 8px; }
        
        .creator { margin-top: 30px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Premium Downloader</h1>
    <input type="text" id="videoUrl" class="input-box" placeholder="Paste video link here...">
    <br>
    <button class="btn" onclick="startDownload()">🚀 DOWNLOAD NOW</button>

    <div class="grid">
        <div class="item"><i class="fab fa-tiktok"></i> TikTok</div>
        <div class="item"><i class="fab fa-twitter"></i> Twitter</div>
        <a href="https://facebook.com/your-profile-link" class="item" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://youtube.com/your-channel-link" class="item" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    </div>

    <div class="creator">
        <p>Created by <b>Sheikh Lam</b></p>
    </div>

    <script>
        function startDownload() {
            var url = document.getElementById("videoUrl").value;
            if(url.length > 5) {
                window.open("https://snapsave.app/?url=" + encodeURIComponent(url), "_blank");
            } else {
                alert("Please paste a link first!");
            }
        }
    </script>

</body>
</html>
